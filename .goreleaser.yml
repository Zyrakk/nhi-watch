version: 2

project_name: nhi-watch

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/nhi-watch
    binary: nhi-watch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Zyrakk/nhi-watch/internal/cli.Version={{.Version}}
      - -X github.com/Zyrakk/nhi-watch/internal/cli.Commit={{.Commit}}
      - -X github.com/Zyrakk/nhi-watch/internal/cli.BuildDate={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

dockers:
  - image_templates:
      - "ghcr.io/zyrakk/nhi-watch:{{ .Version }}"
      - "ghcr.io/zyrakk/nhi-watch:latest"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--build-arg=VERSION={{.Version}}"
      - "--build-arg=COMMIT={{.Commit}}"
      - "--build-arg=BUILD_DATE={{.Date}}"

release:
  github:
    owner: Zyrakk
    name: nhi-watch
