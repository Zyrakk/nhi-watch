{{- if .Values.controller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-nhi-watch-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: nhi-watch
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: nhi-watch
      app.kubernetes.io/component: controller
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nhi-watch
        app.kubernetes.io/component: controller
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - controller
            - start
            - --state-namespace={{ .Values.controller.stateNamespace | default .Release.Namespace }}
            - --state-configmap={{ .Values.controller.stateConfigMap }}
            - --debounce={{ .Values.controller.debounceSeconds }}
            {{- if .Values.controller.webhook.enabled }}
            - --enable-webhook
            - --webhook-port={{ .Values.controller.webhook.port }}
            {{- end }}
          {{- if .Values.controller.webhook.enabled }}
          ports:
            - name: webhook
              containerPort: {{ .Values.controller.webhook.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: webhook
            initialDelaySeconds: 10
            periodSeconds: 30
          {{- else }}
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "kill -0 1"]
            initialDelaySeconds: 10
            periodSeconds: 30
          {{- end }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      restartPolicy: Always
{{- end }}
